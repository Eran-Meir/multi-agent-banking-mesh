name: 2. Stress Test (Test Env)
on: workflow_dispatch
jobs:
  stress-test:
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: '${{ vars.WORKLOAD_IDENTITY_PROVIDER }}'
        service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
    - name: Terraform Init
      run: terraform init -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}"
      working-directory: infrastructure/terraform/environments/test
    - name: Extract IP and Run Stress Test
      run: |
        STATIC_IP=$(terraform -chdir=infrastructure/terraform/environments/test output -raw orchestrator_external_ip)
        # Since the endpoint blocks for 30s, curl will block. We set max-time to 35s so the runner doesn't fail.
        # Fire 5 concurrent requests to ensure we smash the CPU and scale out.
        for i in {1..5}; do
          curl -s --max-time 35 "http://$STATIC_IP/stress_test" > /dev/null &
        done
        wait
        echo "Stress test requests fired and completed. Check your GCP dashboard for the CPU spike!"
