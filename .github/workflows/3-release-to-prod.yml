name: 3. Release to Prod (The Button)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version Tag (e.g. v1.1.0)'
        required: true
permissions:
  contents: 'write'
  id-token: 'write'
jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - id: auth
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: '$${{ vars.WORKLOAD_IDENTITY_PROVIDER }}'
        service_account: '$${{ vars.SERVICE_ACCOUNT_EMAIL }}'
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
    - name: Terraform Init
      run: terraform init -backend-config="bucket=$${{ vars.GCP_TF_STATE_BUCKET }}"
      working-directory: infrastructure/terraform/environments/prod
    - name: Terraform Apply
      run: terraform apply -auto-approve -var="project_id=$${{ vars.GCP_PROJECT_ID }}" -var="environment=prod"
      working-directory: infrastructure/terraform/environments/prod
    - name: Create Git Tag
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git tag $${{ github.event.inputs.version }}
        git push origin $${{ github.event.inputs.version }}
