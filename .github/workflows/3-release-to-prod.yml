name: 3. Release to Prod (The Button)
on:
  workflow_dispatch:
permissions:
  contents: 'write'
  id-token: 'write'
jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - id: auth
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: '${{ vars.WORKLOAD_IDENTITY_PROVIDER }}'
        service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_wrapper: false
    - name: Terraform Init
      run: terraform init -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}"
      working-directory: infrastructure/terraform/environments/prod
    - name: Force Unlock GCS State
      run: gsutil rm gs://${{ vars.GCP_TF_STATE_BUCKET }}/terraform/state/prod/default.tflock || true
    - name: Terraform Apply
      run: terraform apply -auto-approve -lock=false -var="project_id=${{ vars.GCP_PROJECT_ID }}" -var="environment=prod"
      working-directory: infrastructure/terraform/environments/prod
    - name: Configure Docker Auth
      run: gcloud auth configure-docker europe-west4-docker.pkg.dev --quiet
    - name: Build and Push Docker Image
      run: |
        IMAGE_NAME="europe-west4-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/prod-banking-mesh-repo/orchestrator:${{ github.sha }}"
        docker build -t $IMAGE_NAME .
        docker push $IMAGE_NAME
    - name: Configure GKE Credentials Primary
      uses: google-github-actions/get-gke-credentials@v1
      with:
        cluster_name: prod-banking-mesh-gke
        location: europe-west4
        project_id: ${{ vars.GCP_PROJECT_ID }}
    - name: Deploy to Primary Region (europe-west4)
      run: |
        IMAGE_NAME="europe-west4-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/prod-banking-mesh-repo/orchestrator:${{ github.sha }}"
        STATIC_IP=$(terraform -chdir=infrastructure/terraform/environments/prod output -raw orchestrator_external_ip | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)
        echo "STATIC_IP=$STATIC_IP" >> $GITHUB_ENV
        cp infrastructure/k8s/orchestrator.yaml primary.yaml
        sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_NAME|g" primary.yaml
        sed -i "s|ENV_PLACEHOLDER|prod|g" primary.yaml
        sed -i "s|STATIC_IP_PLACEHOLDER|$STATIC_IP|g" primary.yaml
        sed -i "s|MIN_REPLICAS_PLACEHOLDER|1|g" primary.yaml
        sed -i "s|MAX_REPLICAS_PLACEHOLDER|4|g" primary.yaml
        kubectl apply -f primary.yaml
    - name: Configure GKE Credentials Secondary
      uses: google-github-actions/get-gke-credentials@v1
      with:
        cluster_name: prod-banking-mesh-gke-sec
        location: europe-west3
        project_id: ${{ vars.GCP_PROJECT_ID }}
    - name: Deploy to Secondary Region (europe-west3)
      run: |
        IMAGE_NAME="europe-west4-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/prod-banking-mesh-repo/orchestrator:${{ github.sha }}"
        STATIC_IP_SEC=$(terraform -chdir=infrastructure/terraform/environments/prod output -raw orchestrator_external_ip_secondary | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)
        echo "STATIC_IP_SEC=$STATIC_IP_SEC" >> $GITHUB_ENV
        cp infrastructure/k8s/orchestrator.yaml secondary.yaml
        sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_NAME|g" secondary.yaml
        sed -i "s|ENV_PLACEHOLDER|prod|g" secondary.yaml
        sed -i "s|STATIC_IP_PLACEHOLDER|$STATIC_IP_SEC|g" secondary.yaml
        sed -i "s|MIN_REPLICAS_PLACEHOLDER|1|g" secondary.yaml
        sed -i "s|MAX_REPLICAS_PLACEHOLDER|4|g" secondary.yaml
        kubectl apply -f secondary.yaml
    - name: Extract External IPs
      run: |
        echo "🚀 Orchestrator Primary is LIVE at: http://${{ env.STATIC_IP }}" >> $GITHUB_STEP_SUMMARY
        echo "🚀 Orchestrator Secondary is LIVE at: http://${{ env.STATIC_IP_SEC }}" >> $GITHUB_STEP_SUMMARY
        echo "Primary Stress Test: http://${{ env.STATIC_IP }}/stress_test?duration=30" >> $GITHUB_STEP_SUMMARY
        echo "Secondary Stress Test: http://${{ env.STATIC_IP_SEC }}/stress_test?duration=30" >> $GITHUB_STEP_SUMMARY
    - name: App Tester (Integration Test)
      run: |
        echo "Waiting for Orchestrator Primary to become ready on http://${{ env.STATIC_IP }}/..."
        for i in {1..12}; do
          RESPONSE=$(curl -s -f "http://${{ env.STATIC_IP }}/" || echo "FAIL")
          if [[ "$RESPONSE" != "FAIL" ]]; then
            echo "Primary Response: $RESPONSE"
            if echo "$RESPONSE" | grep -q "Enterprise Multi-Agent"; then
              echo "✅ Primary Region Integration Test Passed!"
              break
            fi
          fi
          if [ $i -eq 12 ]; then
            echo "❌ Primary Integration Test Failed!"
            exit 1
          fi
          echo "Waiting 10s..."
          sleep 10
        done

        echo "Waiting for Orchestrator Secondary to become ready on http://${{ env.STATIC_IP_SEC }}/..."
        for i in {1..12}; do
          RESPONSE=$(curl -s -f "http://${{ env.STATIC_IP_SEC }}/" || echo "FAIL")
          if [[ "$RESPONSE" != "FAIL" ]]; then
            echo "Secondary Response: $RESPONSE"
            if echo "$RESPONSE" | grep -q "Enterprise Multi-Agent"; then
              echo "✅ Secondary Region Integration Test Passed!"
              exit 0
            fi
          fi
          if [ $i -eq 12 ]; then
            echo "❌ Secondary Integration Test Failed!"
            exit 1
          fi
          echo "Waiting 10s..."
          sleep 10
        done
    - name: Create Git Tag
      run: |
        VERSION=$(cat VERSION)
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        # Only tag and push if the tag doesn't already exist
        if ! git ls-remote --tags origin | grep -q "refs/tags/$VERSION"; then
          git tag $VERSION
          git push origin $VERSION
        else
          echo "Tag $VERSION already exists. Skipping."
        fi
