name: 3. Release to Prod (The Button)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version Tag (e.g. v1.1.0)'
        required: true
permissions:
  contents: 'write'
  id-token: 'write'
jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - id: auth
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: '${{ vars.WORKLOAD_IDENTITY_PROVIDER }}'
        service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
    - name: Terraform Init
      run: terraform init -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}"
      working-directory: infrastructure/terraform/environments/prod
    - name: Terraform Apply
      run: terraform apply -auto-approve -var="project_id=${{ vars.GCP_PROJECT_ID }}" -var="environment=prod"
      working-directory: infrastructure/terraform/environments/prod
    - name: Configure Docker Auth
      run: gcloud auth configure-docker me-west1-docker.pkg.dev --quiet
    - name: Build and Push Docker Image
      run: |
        IMAGE_NAME="me-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/prod-banking-mesh-repo/orchestrator:${{ github.sha }}"
        docker build -t $IMAGE_NAME .
        docker push $IMAGE_NAME
    - name: Configure GKE Credentials
      uses: google-github-actions/get-gke-credentials@v1
      with:
        cluster_name: prod-banking-mesh-gke
        location: me-west1
        project_id: ${{ vars.GCP_PROJECT_ID }}
    - name: Deploy to Kubernetes
      run: |
        IMAGE_NAME="me-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/prod-banking-mesh-repo/orchestrator:${{ github.sha }}"
        sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_NAME|g" infrastructure/k8s/orchestrator.yaml
        sed -i "s|ENV_PLACEHOLDER|prod|g" infrastructure/k8s/orchestrator.yaml
        kubectl apply -f infrastructure/k8s/orchestrator.yaml
    - name: Create Git Tag
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git tag ${{ github.event.inputs.version }}
        git push origin ${{ github.event.inputs.version }}
