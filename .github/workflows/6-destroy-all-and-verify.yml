name: 6. Destroy ALL and Verify
on: workflow_dispatch
permissions:
  contents: 'read'
  id-token: 'write'
jobs:
  nuke-all:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - id: auth
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: '${{ vars.WORKLOAD_IDENTITY_PROVIDER }}'
        service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
    - name: Terraform Init & Destroy Test
      run: |
        terraform init -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}"
        terraform destroy -auto-approve -var="project_id=${{ vars.GCP_PROJECT_ID }}" -var="environment=test" || true
      working-directory: infrastructure/terraform/environments/test
    - name: Terraform Init & Destroy Prod
      run: |
        terraform init -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}"
        terraform destroy -auto-approve -var="project_id=${{ vars.GCP_PROJECT_ID }}" -var="environment=prod" || true
      working-directory: infrastructure/terraform/environments/prod
    - name: Final Verification
      run: |
        chmod +x infrastructure/verify-nuke.sh
        infrastructure/verify-nuke.sh ${{ vars.GCP_PROJECT_ID }}
