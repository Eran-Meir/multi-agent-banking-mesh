name: 1. Auto-Deploy to Test
on:
  workflow_dispatch:
permissions:
  contents: 'read'
  id-token: 'write'
jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: '${{ vars.WORKLOAD_IDENTITY_PROVIDER }}'
        service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false
    - name: Terraform Init
      run: terraform init -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}"
      working-directory: infrastructure/terraform/environments/test
    - name: Force Unlock GCS State
      run: gsutil rm gs://${{ vars.GCP_TF_STATE_BUCKET }}/terraform/state/test/default.tflock || true
    - name: Terraform Apply
      run: terraform apply -auto-approve -lock=false -var="project_id=${{ vars.GCP_PROJECT_ID }}" -var="environment=test"
      working-directory: infrastructure/terraform/environments/test
    - name: Configure Docker Auth
      run: gcloud auth configure-docker me-west1-docker.pkg.dev --quiet
    - name: Build and Push Docker Image
      run: |
        IMAGE_NAME="me-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/test-banking-mesh-repo/orchestrator:${{ github.sha }}"
        docker build -t $IMAGE_NAME .
        docker push $IMAGE_NAME
    - name: Configure GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: test-banking-mesh-gke
        location: me-west1
        project_id: ${{ vars.GCP_PROJECT_ID }}
    - name: Deploy to Kubernetes
      run: |
        IMAGE_NAME="me-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/test-banking-mesh-repo/orchestrator:${{ github.sha }}"
        STATIC_IP=$(terraform -chdir=infrastructure/terraform/environments/test output -raw orchestrator_external_ip | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)
        echo "STATIC_IP=$STATIC_IP" >> $GITHUB_ENV
        sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_NAME|g" infrastructure/k8s/orchestrator.yaml
        sed -i "s|ENV_PLACEHOLDER|test|g" infrastructure/k8s/orchestrator.yaml
        sed -i "s|REGION_PLACEHOLDER|me-west1|g" infrastructure/k8s/orchestrator.yaml
        sed -i "s|STATIC_IP_PLACEHOLDER|$STATIC_IP|g" infrastructure/k8s/orchestrator.yaml
        sed -i "s|PROJECT_ID_PLACEHOLDER|${{ vars.GCP_PROJECT_ID }}|g" infrastructure/k8s/orchestrator.yaml
        sed -i "s|MIN_REPLICAS_PLACEHOLDER|1|g" infrastructure/k8s/orchestrator.yaml
        sed -i "s|MAX_REPLICAS_PLACEHOLDER|2|g" infrastructure/k8s/orchestrator.yaml
        kubectl create secret generic banking-mesh-secrets --from-literal=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -f infrastructure/k8s/orchestrator.yaml
    - name: Extract External IP
      run: |
        echo "🚀 Orchestrator is LIVE at: http://${{ env.STATIC_IP }}" >> $GITHUB_STEP_SUMMARY
        echo "Stress Test Endpoint: http://${{ env.STATIC_IP }}/stress_test" >> $GITHUB_STEP_SUMMARY
    - name: App Tester (Integration Test)
      run: |
        MAX_RETRIES=12
        RETRY_INTERVAL_SEC=10
        echo "Waiting for Orchestrator to become ready on http://${{ env.STATIC_IP }}/..."
        for (( i=1; i<=MAX_RETRIES; i++ )); do
          RESPONSE=$(curl -s -f "http://${{ env.STATIC_IP }}/" || echo "FAIL")
          if [[ "$RESPONSE" != "FAIL" ]]; then
            echo "Response: $RESPONSE"
            if echo "$RESPONSE" | grep -q "Enterprise Multi-Agent"; then
              echo "✅ Integration Test Passed! App is returning correct enterprise greeting."
              exit 0
            fi
          fi
          echo "Waiting ${RETRY_INTERVAL_SEC}s..."
          sleep $RETRY_INTERVAL_SEC
        done
        echo "❌ Integration Test Failed! App did not return expected response within allotted time."
        exit 1
