apiVersion: v1
kind: ServiceAccount
metadata:
  name: banking-mesh-ksa
  annotations:
    iam.gke.io/gcp-service-account: ENV_PLACEHOLDER-mesh-sa@PROJECT_ID_PLACEHOLDER.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-mesh-orchestrator
  labels:
    app: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      serviceAccountName: banking-mesh-ksa
      containers:
      - name: orchestrator
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 100m
            memory: 512Mi
        env:
        - name: ENVIRONMENT
          value: ENV_PLACEHOLDER
        - name: REGION
          value: REGION_PLACEHOLDER
---
apiVersion: v1
kind: Service
metadata:
  name: banking-mesh-orchestrator
spec:
  selector:
    app: orchestrator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
  loadBalancerIP: STATIC_IP_PLACEHOLDER
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: banking-mesh-orchestrator-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: banking-mesh-orchestrator
  minReplicas: MIN_REPLICAS_PLACEHOLDER
  maxReplicas: MAX_REPLICAS_PLACEHOLDER
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-mesh-profiler
  labels:
    app: profiler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profiler
  template:
    metadata:
      labels:
        app: profiler
    spec:
      serviceAccountName: banking-mesh-ksa
      containers:
      - name: profiler
        image: IMAGE_PLACEHOLDER
        args: ["uvicorn", "agents.profiler.main:app", "--host", "0.0.0.0", "--port", "8080"]
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 100m
            memory: 512Mi
        env:
        - name: ENVIRONMENT
          value: ENV_PLACEHOLDER
        - name: REGION
          value: REGION_PLACEHOLDER
---
apiVersion: v1
kind: Service
metadata:
  name: profiler-service
spec:
  selector:
    app: profiler
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
